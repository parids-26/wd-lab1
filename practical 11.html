<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 API Showcase</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; padding: 20px; background-color: #f0f2f5; }
        section { background: white; margin-bottom: 20px; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
        
        /* Drag and Drop Styles */
        .drop-zone { width: 100%; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
        #drag-item { width: 80px; height: 80px; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; cursor: grab; border-radius: 4px; }

        /* General UI */
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>HTML5 API Dashboard</h1>

    <section>
        <h2>1. Geolocation API</h2>
        <p>Click the button to get your current coordinates.</p>
        <button onclick="getLocation()">Get My Location</button>
        <p id="geo-output"></p>
    </section>

    <section>
        <h2>2. Web Storage (Local Storage)</h2>
        <p>Your name will persist even if you refresh the page.</p>
        <input type="text" id="name-input" placeholder="Enter your name">
        <button onclick="saveName()">Save Name</button>
        <p id="storage-output"></p>
    </section>

    <section>
        <h2>3. Drag & Drop API</h2>
        <p>Drag the blue square from the top box to the bottom box.</p>
        <div id="zone1" class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div id="drag-item" draggable="true" ondragstart="drag(event)">Drag Me</div>
        </div>
        <div id="zone2" class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </section>

    <script>
        // --- GEOLOCATION LOGIC ---
        function getLocation() {
            const output = document.getElementById('geo-output');
            if (navigator.geolocation) {
                output.innerHTML = "Locating...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        output.innerHTML = Latitude: ${position.coords.latitude} <br> Longitude: ${position.coords.longitude};
                    },
                    () => { output.innerHTML = "Unable to retrieve location."; }
                );
            } else {
                output.innerHTML = "Geolocation is not supported by your browser.";
            }
        }

        // --- WEB STORAGE LOGIC ---
        function saveName() {
            const name = document.getElementById('name-input').value;
            localStorage.setItem('username', name);
            displayStoredName();
        }

        function displayStoredName() {
            const storedName = localStorage.getItem('username');
            const output = document.getElementById('storage-output');
            output.innerHTML = storedName ? Hello, <strong>${storedName}</strong>! I remember you. : "No name stored yet.";
        }
        // Run on page load
        displayStoredName();

        // --- DRAG AND DROP LOGIC ---
        function allowDrop(ev) {
            ev.preventDefault(); // Necessary to allow dropping
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            // Only append if the target is a drop zone
            if (ev.target.classList.contains('drop-zone')) {
                ev.target.appendChild(document.getElementById(data));
            }
        }
    </script>
</body>
</html>
